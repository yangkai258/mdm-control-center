<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw控制按钮测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f7;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1d1d1f;
            margin-bottom: 30px;
        }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-button {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .control-button:active {
            transform: translateY(0);
        }
        .btn-danger {
            background: linear-gradient(180deg, #dc3545, #c82333);
            color: white;
        }
        .btn-warning {
            background: linear-gradient(180deg, #ffc107, #e0a800);
            color: #212529;
        }
        .button-icon {
            font-size: 24px;
        }
        .status-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            color: #6c757d;
        }
        .status-value {
            font-weight: 600;
        }
        .status-running {
            color: #28a745;
        }
        .status-stopped {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 OpenClaw 控制中心</h1>
        
        <div class="control-panel">
            <button class="control-button btn-danger" onclick="controlService('stop-control-center')">
                <span class="button-icon">🦞</span>
                <span>龙虾关机</span>
                <small>停止OpenClaw Control Center服务</small>
            </button>
            
            <button class="control-button btn-warning" onclick="controlService('restart-control-center')">
                <span class="button-icon">🔄</span>
                <span>监控重启</span>
                <small>重启OpenClaw Control Center服务</small>
            </button>
            
            <button class="control-button btn-danger" onclick="controlService('stop-openclaw')">
                <span class="button-icon">📊</span>
                <span>监控关机</span>
                <small>停止OpenClaw服务</small>
            </button>
            
            <button class="control-button btn-warning" onclick="controlService('restart-openclaw')">
                <span class="button-icon">🦞🔄</span>
                <span>龙虾重启</span>
                <small>重启OpenClaw服务</small>
            </button>
        </div>
        
        <div class="status-panel">
            <h3>服务状态</h3>
            <div class="status-item">
                <span class="status-label">OpenClaw Control Center:</span>
                <span class="status-value status-running" id="status-control-center">运行中</span>
            </div>
            <div class="status-item">
                <span class="status-label">OpenClaw 服务:</span>
                <span class="status-value status-running" id="status-openclaw">运行中</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后操作:</span>
                <span class="status-value" id="last-operation">无</span>
            </div>
            <div class="status-item">
                <span class="status-label">操作时间:</span>
                <span class="status-value" id="operation-time">-</span>
            </div>
        </div>
    </div>

    <script>
        async function controlService(action) {
            const buttons = document.querySelectorAll('.control-button');
            buttons.forEach(btn => btn.disabled = true);
            
            const operationTime = new Date().toLocaleString('zh-CN');
            document.getElementById('operation-time').textContent = operationTime;
            
            try {
                // 模拟API调用
                console.log(`调用控制API: ${action}`);
                
                // 模拟延迟
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                let message = '';
                let statusUpdate = '';
                
                switch(action) {
                    case 'stop-control-center':
                        message = 'OpenClaw Control Center服务已停止';
                        statusUpdate = '已停止';
                        document.getElementById('status-control-center').className = 'status-value status-stopped';
                        document.getElementById('status-control-center').textContent = statusUpdate;
                        break;
                    case 'restart-control-center':
                        message = 'OpenClaw Control Center服务正在重启...';
                        statusUpdate = '重启中';
                        document.getElementById('status-control-center').className = 'status-value status-running';
                        document.getElementById('status-control-center').textContent = statusUpdate;
                        break;
                    case 'stop-openclaw':
                        message = 'OpenClaw服务已停止';
                        statusUpdate = '已停止';
                        document.getElementById('status-openclaw').className = 'status-value status-stopped';
                        document.getElementById('status-openclaw').textContent = statusUpdate;
                        break;
                    case 'restart-openclaw':
                        message = 'OpenClaw服务正在重启...';
                        statusUpdate = '重启中';
                        document.getElementById('status-openclaw').className = 'status-value status-running';
                        document.getElementById('status-openclaw').textContent = statusUpdate;
                        break;
                }
                
                document.getElementById('last-operation').textContent = message;
                
                // 显示成功消息
                alert(`✅ ${message}`);
                
                // 如果是重启操作，显示倒计时
                if (action.includes('restart')) {
                    let countdown = 3;
                    const countdownInterval = setInterval(() => {
                        if (countdown > 0) {
                            alert(`服务将在 ${countdown} 秒后重启完成...`);
                            countdown--;
                        } else {
                            clearInterval(countdownInterval);
                            if (action === 'restart-control-center') {
                                document.getElementById('status-control-center').textContent = '运行中';
                            } else {
                                document.getElementById('status-openclaw').textContent = '运行中';
                            }
                            alert('✅ 服务重启完成！');
                        }
                    }, 1000);
                }
                
            } catch (error) {
                document.getElementById('last-operation').textContent = `操作失败: ${error.message}`;
                alert(`❌ 操作失败: ${error.message}`);
            } finally {
                buttons.forEach(btn => btn.disabled = false);
            }
        }
        
        // 初始化状态
        document.addEventListener('DOMContentLoaded', () => {
            console.log('OpenClaw控制面板已加载');
        });
    </script>
</body>
</html>
