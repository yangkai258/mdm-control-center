<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 数据分析看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f0883e;
            --accent-pink: #f778ba;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .back-link:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        /* 加载状态 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(247, 120, 186, 0.1);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        /* 概览卡片 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(88, 166, 255, 0.1);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .card-value.blue { color: var(--accent-blue); }
        .card-value.green { color: var(--accent-green); }
        .card-value.orange { color: var(--accent-orange); }
        .card-value.pink { color: var(--accent-pink); }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        /* MBTI 热力图 */
        .mbti-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 500px;
            margin: 0 auto;
        }

        .mbti-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .mbti-cell:hover {
            transform: scale(1.05);
            border-color: var(--accent-blue);
        }

        .mbti-type {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .mbti-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .mbti-percent {
            font-size: 0.75rem;
            color: var(--accent-blue);
        }

        /* SVG 图表通用 */
        .svg-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        /* 环形图 */
        .donut-chart {
            transform: rotate(-90deg);
        }

        .donut-segment {
            fill: none;
            stroke-width: 30;
            transition: all 0.3s ease;
        }

        .donut-segment:hover {
            stroke-width: 35;
        }

        .donut-center {
            position: relative;
        }

        .donut-label {
            font-size: 1.5rem;
            font-weight: 700;
            fill: var(--text-primary);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .donut-sublabel {
            font-size: 0.9rem;
            fill: var(--text-secondary);
            text-anchor: middle;
        }

        /* 折线图 */
        .line-chart {
            width: 100%;
            height: 250px;
        }

        .line-path {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .line-area {
            fill: url(#lineGradient);
            opacity: 0.3;
        }

        .grid-line {
            stroke: var(--border-color);
            stroke-width: 1;
        }

        .axis-label {
            font-size: 0.75rem;
            fill: var(--text-secondary);
        }

        .data-point {
            fill: var(--accent-blue);
            stroke: var(--bg-secondary);
            stroke-width: 2;
        }

        /* 进度条 */
        .progress-container {
            margin-bottom: 20px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .progress-bar {
            height: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease;
        }

        .progress-fill.green { background: var(--accent-green); }
        .progress-fill.orange { background: var(--accent-orange); }
        .progress-fill.blue { background: var(--accent-blue); }

        /* 环形进度 */
        .circular-progress {
            width: 150px;
            height: 150px;
            margin: 20px auto;
        }

        .circular-bg {
            fill: none;
            stroke: var(--bg-tertiary);
            stroke-width: 12;
        }

        .circular-fill {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 12;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            transition: stroke-dashoffset 1s ease;
        }

        .circular-text {
            font-size: 2rem;
            font-weight: 700;
            fill: var(--text-primary);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* 柱状图 */
        .bar-chart {
            width: 100%;
            height: 200px;
        }

        .bar {
            transition: all 0.3s ease;
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-label {
            font-size: 0.75rem;
            fill: var(--text-secondary);
            text-anchor: middle;
        }

        .bar-value {
            font-size: 0.8rem;
            fill: var(--text-primary);
            text-anchor: middle;
        }

        /* 图例 */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* 问题统计 */
        .question-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .question-item {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 8px;
        }

        .question-header {
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .option-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .option-label {
            width: 60px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .option-track {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .option-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent-blue);
        }

        .option-count {
            width: 40px;
            font-size: 0.8rem;
            color: var(--text-primary);
            text-align: right;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .overview-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .mbti-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .card-value {
                font-size: 1.8rem;
            }

            .container {
                padding: 12px;
            }
        }

        @media (max-width: 480px) {
            .overview-grid {
                grid-template-columns: 1fr;
            }

            .mbti-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 日期筛选 */
        .date-filter {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-filter label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .date-input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .refresh-btn {
            background: var(--accent-blue);
            color: var(--bg-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>📊 MBTI 数据分析看板</h1>
            <a href="test.html" class="back-link">
                ← 返回测试主页
            </a>
        </header>

        <!-- 加载状态 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <!-- 错误状态 -->
        <div id="error" class="error-message" style="display: none;">
            <p>数据加载失败，请检查网络连接或稍后重试</p>
            <button class="refresh-btn" onclick="loadAllData()" style="margin-top: 12px;">重新加载</button>
        </div>

        <!-- 主内容 -->
        <div id="dashboard" style="display: none;">
            <!-- 日期筛选 -->
            <div class="date-filter">
                <label>开始日期:</label>
                <input type="date" id="startDate" class="date-input">
                <label>结束日期:</label>
                <input type="date" id="endDate" class="date-input">
                <button class="refresh-btn" onclick="loadAllData()">刷新数据</button>
            </div>

            <!-- 概览卡片 -->
            <div class="overview-grid" id="overviewGrid">
                <!-- 由 JS 动态生成 -->
            </div>

            <!-- 图表区域 -->
            <div class="charts-grid">
                <!-- MBTI 分布热力图 -->
                <div class="chart-card full-width">
                    <h2 class="chart-title">🔥 MBTI 类型分布</h2>
                    <div class="mbti-grid" id="mbtiGrid"></div>
                </div>

                <!-- 维度分布环形图 -->
                <div class="chart-card">
                    <h2 class="chart-title">📐 维度分布</h2>
                    <div class="svg-container">
                        <svg width="280" height="280" viewBox="0 0 280 280" id="dimensionChart">
                            <!-- 由 JS 动态生成 -->
                        </svg>
                    </div>
                    <div class="legend" id="dimensionLegend"></div>
                </div>

                <!-- 完成率 -->
                <div class="chart-card">
                    <h2 class="chart-title">✅ 完成率分析</h2>
                    <svg class="circular-progress" viewBox="0 0 150 150">
                        <circle class="circular-bg" cx="75" cy="75" r="60"></circle>
                        <circle class="circular-fill" id="completionCircle" cx="75" cy="75" r="60" 
                            stroke-dasharray="377" stroke-dashoffset="377"></circle>
                        <text class="circular-text" id="completionText" x="75" y="75">0%</text>
                    </svg>
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>总开始</span>
                            <span id="totalStarted">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill green" id="startedBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>已完成</span>
                            <span id="completedCount">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill blue" id="completedBar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>放弃率</span>
                            <span id="abandonRate">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill orange" id="abandonBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- 时间趋势折线图 -->
                <div class="chart-card full-width">
                    <h2 class="chart-title">📈 趋势分析 (近 7 天)</h2>
                    <div class="svg-container">
                        <svg class="line-chart" id="trendChart" viewBox="0 0 800 250">
                            <defs>
                                <linearGradient id="lineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:var(--accent-blue);stop-opacity:0.5"/>
                                    <stop offset="100%" style="stop-color:var(--accent-blue);stop-opacity:0"/>
                                </linearGradient>
                            </defs>
                            <!-- 由 JS 动态生成 -->
                        </svg>
                    </div>
                </div>

                <!-- 用户画像 -->
                <div class="chart-card">
                    <h2 class="chart-title">👥 年龄分布</h2>
                    <div class="svg-container">
                        <svg class="bar-chart" id="ageChart" viewBox="0 0 400 200">
                            <!-- 由 JS 动态生成 -->
                        </svg>
                    </div>
                </div>

                <!-- 性别分布 -->
                <div class="chart-card">
                    <h2 class="chart-title">♀♂ 性别分布</h2>
                    <div class="svg-container">
                        <svg class="bar-chart" id="genderChart" viewBox="0 0 400 200">
                            <!-- 由 JS 动态生成 -->
                        </svg>
                    </div>
                </div>

                <!-- 问题统计 -->
                <div class="chart-card full-width">
                    <h2 class="chart-title">📝 题目选项统计</h2>
                    <div class="question-stats" id="questionStats"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL（开发时可修改）
        const API_BASE = '';

        // 颜色配置
        const COLORS = {
            blue: '#58a6ff',
            green: '#3fb950',
            orange: '#f0883e',
            pink: '#f778ba',
            purple: '#a371f7',
            cyan: '#33c481',
            yellow: '#d29922',
            red: '#f85149'
        };

        const DIMENSION_COLORS = [
            COLORS.blue, COLORS.green, COLORS.orange, COLORS.pink,
            COLORS.purple, COLORS.cyan, COLORS.yellow, COLORS.red
        ];

        // MBTI 类型顺序
        const MBTI_ORDER = [
            'ISTJ', 'ISFJ', 'INFJ', 'INTJ',
            'ISTP', 'ISFP', 'INFP', 'INTP',
            'ESTP', 'ESFP', 'ENFP', 'ENTP',
            'ESTJ', 'ESFJ', 'ENFJ', 'ENTJ'
        ];

        // 维度标签
        const DIMENSION_LABELS = {
            E: '外向', I: '内向',
            S: '实感', N: '直觉',
            T: '理智', F: '情感',
            J: '判断', P: '知觉'
        };

        // 获取日期范围
        function getDateRange() {
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - 30);
            return {
                start: start.toISOString().split('T')[0],
                end: end.toISOString().split('T')[0]
            };
        }

        // 初始化日期选择器
        function initDatePickers() {
            const range = getDateRange();
            document.getElementById('startDate').value = range.start;
            document.getElementById('endDate').value = range.end;
        }

        // API 请求封装
        async function fetchAPI(endpoint, params = {}) {
            const url = new URL(API_BASE + endpoint);
            Object.entries(params).forEach(([key, value]) => {
                url.searchParams.append(key, value);
            });
            
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        }

        // 渲染概览卡片
        function renderOverview(data) {
            const grid = document.getElementById('overviewGrid');
            const cards = [
                { title: '总用户数', value: data.total_users, color: 'blue', subtitle: '注册用户' },
                { title: '总测试数', value: data.total_tests, color: 'green', subtitle: '累计测试' },
                { title: '完成测试', value: data.completed_tests, color: 'orange', subtitle: '已完成' },
                { title: '平均时长', value: `${data.avg_duration}分钟`, color: 'pink', subtitle: '每次测试' },
                { title: '今日用户', value: data.today_users, color: 'blue', subtitle: '新增注册' },
                { title: '今日测试', value: data.today_tests, color: 'green', subtitle: '今日完成' }
            ];

            grid.innerHTML = cards.map(card => `
                <div class="card">
                    <div class="card-title">${card.title}</div>
                    <div class="card-value ${card.color}">${card.value}</div>
                    <div class="card-subtitle">${card.subtitle}</div>
                </div>
            `).join('');
        }

        // 渲染 MBTI 热力图
        function renderMBTIGrid(data) {
            const grid = document.getElementById('mbtiGrid');
            const maxValue = Math.max(...data.map(d => d.count));

            grid.innerHTML = MBTI_ORDER.map(type => {
                const item = data.find(d => d.type === type) || { count: 0, percentage: 0 };
                const intensity = item.count / maxValue;
                const bgColor = `rgba(88, 166, 255, ${0.2 + intensity * 0.6})`;
                
                return `
                    <div class="mbti-cell" style="background: ${bgColor}; border-color: ${item.count > 0 ? COLORS.blue : 'var(--border-color)'}">
                        <div class="mbti-type">${type}</div>
                        <div class="mbti-count">${item.count}人</div>
                        <div class="mbti-percent">${item.percentage.toFixed(1)}%</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染维度环形图
        function renderDimensionChart(data) {
            const svg = document.getElementById('dimensionChart');
            const legend = document.getElementById('dimensionLegend');
            
            const dimensions = ['E', 'I', 'S', 'N', 'T', 'F', 'J', 'P'];
            const values = dimensions.map(d => data[d]?.percentage || 0);
            const total = values.reduce((a, b) => a + b, 0);
            
            // 计算环形图
            const radius = 100;
            const circumference = 2 * Math.PI * radius;
            let offset = 0;
            
            const segments = dimensions.map((dim, i) => {
                const percentage = values[i] / total * 100;
                const dashLength = (percentage / 100) * circumference;
                const color = DIMENSION_COLORS[i];
                
                const segment = `
                    <circle class="donut-segment" 
                        cx="140" cy="140" r="${radius}"
                        stroke="${color}"
                        stroke-dasharray="${dashLength} ${circumference - dashLength}"
                        stroke-dashoffset="${-offset}">
                        <title>${DIMENSION_LABELS[dim]}: ${percentage.toFixed(1)}%</title>
                    </circle>
                `;
                offset += dashLength;
                return segment;
            }).join('');

            // 图例
            const legendItems = dimensions.map((dim, i) => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${DIMENSION_COLORS[i]}"></div>
                    <span>${DIMENSION_LABELS[dim]}: ${values[i].toFixed(1)}%</span>
                </div>
            `).join('');

            svg.innerHTML = `
                ${segments}
                <text class="donut-label" x="140" y="130">维度</text>
                <text class="donut-sublabel" x="140" y="160">分布</text>
            `;
            
            legend.innerHTML = legendItems;
        }

        // 渲染完成率
        function renderCompletionRate(data) {
            const circle = document.getElementById('completionCircle');
            const text = document.getElementById('completionText');
            const circumference = 2 * Math.PI * 60;
            
            const percentage = data.completion_rate || 0;
            const offset = circumference - (percentage / 100) * circumference;
            
            circle.style.strokeDashoffset = offset;
            text.textContent = `${percentage.toFixed(1)}%`;
            
            document.getElementById('totalStarted').textContent = data.total_started;
            document.getElementById('completedCount').textContent = data.completed;
            document.getElementById('abandonRate').textContent = `${data.abandon_rate.toFixed(1)}%`;
            
            document.getElementById('startedBar').style.width = '100%';
            document.getElementById('completedBar').style.width = `${percentage}%`;
            document.getElementById('abandonBar').style.width = `${data.abandon_rate}%`;
        }

        // 渲染趋势折线图
        function renderTrendChart(data) {
            const svg = document.getElementById('trendChart');
            
            if (!data || data.length === 0) {
                svg.innerHTML = '<text x="400" y="125" text-anchor="middle" fill="var(--text-secondary)">暂无数据</text>';
                return;
            }

            const width = 800;
            const height = 250;
            const padding = { top: 20, right: 30, bottom: 40, left: 50 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            // 获取最大值
            const maxValue = Math.max(
                ...data.map(d => Math.max(d.registrations, d.tests, d.completions))
            ) * 1.1;

            // 生成网格线
            const gridLines = Array.from({ length: 5 }, (_, i) => {
                const y = padding.top + (chartHeight / 4) * i;
                const value = Math.round(maxValue - (maxValue / 4) * i);
                return `
                    <line class="grid-line" x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}"/>
                    <text class="axis-label" x="${padding.left - 10}" y="${y + 4}" text-anchor="end">${value}</text>
                `;
            }).join('');

            // 生成 X 轴标签
            const xLabels = data.map((d, i) => {
                const x = padding.left + (chartWidth / (data.length - 1)) * i;
                return `<text class="axis-label" x="${x}" y="${height - 10}" text-anchor="middle">${d.date.slice(5)}</text>`;
            }).join('');

            // 生成路径
            const createPath = (key, color) => {
                const points = data.map((d, i) => {
                    const x = padding.left + (chartWidth / (data.length - 1)) * i;
                    const y = padding.top + chartHeight - (d[key] / maxValue) * chartHeight;
                    return `${x},${y}`;
                }).join(' ');

                const firstX = padding.left;
                const lastX = padding.left + chartWidth;
                const areaPath = `${firstX},${height - padding.bottom} ${points} ${lastX},${height - padding.bottom}`;

                return `
                    <polygon class="line-area" points="${areaPath}"/>
                    <polyline class="line-path" points="${points}" style="stroke: ${color}"/>
                `;
            };

            // 生成数据点
            const createPoints = (key, color) => {
                return data.map((d, i) => {
                    const x = padding.left + (chartWidth / (data.length - 1)) * i;
                    const y = padding.top + chartHeight - (d[key] / maxValue) * chartHeight;
                    return `<circle class="data-point" cx="${x}" cy="${y}" r="5" style="fill: ${color}"/>`;
                }).join('');
            };

            svg.innerHTML = `
                ${gridLines}
                ${xLabels}
                ${createPath('registrations', COLORS.blue)}
                ${createPath('tests', COLORS.green)}
                ${createPath('completions', COLORS.orange)}
                ${createPoints('registrations', COLORS.blue)}
                ${createPoints('tests', COLORS.green)}
                ${createPoints('completions', COLORS.orange)}
            `;
        }

        // 渲染柱状图
        function renderBarChart(svgId, data, colorKey) {
            const svg = document.getElementById(svgId);
            
            if (!data || data.length === 0) {
                svg.innerHTML = '<text x="200" y="100" text-anchor="middle" fill="var(--text-secondary)">暂无数据</text>';
                return;
            }

            const maxValue = Math.max(...data.map(d => d.count)) * 1.1;
            const barWidth = 50;
            const gap = 30;
            const totalWidth = data.length * (barWidth + gap);
            const startX = (400 - totalWidth) / 2;

            const colors = [COLORS.blue, COLORS.green, COLORS.orange, COLORS.pink, COLORS.purple];

            svg.innerHTML = data.map((d, i) => {
                const barHeight = (d.count / maxValue) * 150;
                const x = startX + i * (barWidth + gap);
                const y = 180 - barHeight;
                const color = colors[i % colors.length];

                return `
                    <rect class="bar" x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" 
                        rx="4" fill="${color}"/>
                    <text class="bar-value" x="${x + barWidth/2}" y="${y - 8}">${d.count}</text>
                    <text class="bar-label" x="${x + barWidth/2}" y="195">${d.range || d.gender}</text>
                `;
            }).join('');
        }

        // 渲染问题统计
        function renderQuestionStats(data) {
            const container = document.getElementById('questionStats');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">暂无数据</p>';
                return;
            }

            const maxCount = Math.max(...data.flatMap(q => 
                Object.values(q.option_stats)
            ));

            container.innerHTML = data.slice(0, 12).map(q => {
                const options = Object.entries(q.option_stats);
                const optionBars = options.map(([opt, count]) => {
                    const percentage = (count / maxCount) * 100;
                    return `
                        <div class="option-bar">
                            <span class="option-label">${opt}</span>
                            <div class="option-track">
                                <div class="option-fill" style="width: ${percentage}%"></div>
                            </div>
                            <span class="option-count">${count}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="question-item">
                        <div class="question-header">题目 ${q.question_id}</div>
                        ${optionBars}
                    </div>
                `;
            }).join('');
        }

        // 加载所有数据
        async function loadAllData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const dashboard = document.getElementById('dashboard');

            loading.style.display = 'flex';
            error.style.display = 'none';
            dashboard.style.display = 'none';

            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                // 并行请求所有数据
                const [overview, mbtiDist, dimensionDist, questionStats, trends, completionRate, demographics] = await Promise.all([
                    fetchAPI('/api/analytics/overview'),
                    fetchAPI('/api/analytics/mbti-distribution', { start_date: startDate, end_date: endDate }),
                    fetchAPI('/api/analytics/dimension-distribution'),
                    fetchAPI('/api/analytics/question-stats'),
                    fetchAPI('/api/analytics/trends', { days: 7 }),
                    fetchAPI('/api/analytics/completion-rate'),
                    fetchAPI('/api/analytics/demographics')
                ]);

                // 渲染所有图表
                renderOverview(overview);
                renderMBTIGrid(mbtiDist);
                renderDimensionChart(dimensionDist);
                renderCompletionRate(completionRate);
                renderTrendChart(trends);
                renderBarChart('ageChart', demographics.age_distribution);
                renderBarChart('genderChart', demographics.gender_distribution);
                renderQuestionStats(questionStats);

                loading.style.display = 'none';
                dashboard.style.display = 'block';

            } catch (err) {
                console.error('数据加载失败:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                
                // 开发环境使用模拟数据
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    console.log('使用模拟数据...');
                    loadMockData();
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initDatePickers();
            loadAllData();
        });
    </script>
